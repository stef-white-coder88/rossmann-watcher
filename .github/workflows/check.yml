name: Rossmann Watcher

on:
  schedule:
    - cron: '*/15 * * * *' # alle 15 Minuten (GitHub kann leicht verzoegern)
  workflow_dispatch: {} # manueller Start per Knopf moeglich

# Verhindert, dass sich ueberlappende Laeufe stapeln
concurrency:
  group: rossmann-watcher
  cancel-in-progress: false

permissions:
  contents: write # damit der Job sich state.json zurueckschreiben darf

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install dependencies + Chromium
        run: |
          npm install
          npx playwright install --with-deps chromium

      - name: Run availability check
        env:
          PUSHOVER_USER: ${{ secrets.PUSHOVER_USER }}
          PUSHOVER_TOKEN: ${{ secrets.PUSHOVER_TOKEN }}
        run: node check.mjs

      - name: Persist state
        run: |
          if [ -n "$(git status --porcelain state.json)" ]; then
            git config user.name "rossmann-watcher"
            git config user.email "rossmann-watcher@users.noreply.github.com"
            git add state.json
            git commit -m "state: update [skip ci]"
            git push
          else
            echo "Kein State-Wechsel - kein Commit."
          fi

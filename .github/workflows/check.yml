name: Rossmann Watcher

on:
  schedule:
    - cron: '*/15 * * * *' # alle 15 Minuten (GitHub kann leicht verzoegern)
  workflow_dispatch: {} # manueller Start per Knopf moeglich

# Verhindert, dass sich ueberlappende Laeufe stapeln
concurrency:
  group: rossmann-watcher
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies + Chromium
        run: |
          npm install
          npx playwright install --with-deps chromium

      - name: Run availability check
        env:
          PUSHOVER_USER: ${{ secrets.PUSHOVER_USER }}
          PUSHOVER_TOKEN: ${{ secrets.PUSHOVER_TOKEN }}
        run: node check.mjs
